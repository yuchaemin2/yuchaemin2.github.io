experiences:
  title: Projects
  info:
  - role: Backend & AI Developer
    time: Mar 2025 - Nov 2025
    company: EYEDIA Project (AI-powered Museum Docent Service)
    link: "https://github.com/2025-DSWU-CS-FP/EYEDIA_BE"
    details: |
      Designed and developed an AI-powered wearable docent system that provides personalized 
      artwork explanations based on real-time user gaze tracking. Built a scalable backend by 
      separating AI inference from core services and enhanced explanation quality through a 
      multimodal RAG pipeline.

      - Artwork Detection Optimization: Fine-tuned a YOLOv8 model using a custom-labeled dataset of paintings and drawings → achieved 90%+ detection accuracy and stable real-time performance in exhibition environments
      - LLM + RAG Pipeline Design: Indexed artwork metadata (title, artist, period, technique) into a FAISS vector database → dynamically constructed prompts using retrieval results, reducing hallucination and improving response consistency
      - Gaze-Based Interaction Logic: Mapped gaze tracking coordinates with object bounding boxes → triggered explanations when users focused on specific regions for a defined duration, enabling a hands-free UX
      - Spring Boot Backend Development: Designed APIs for authentication, artwork management, and viewing history → implemented Spring Security with OAuth2 (Naver, Google) for secure user management
      - AI Inference Server Separation: Built a dedicated FastAPI server for ML inference → decoupled from the main backend via REST APIs, improving scalability and maintainability
      - Infrastructure & Collaboration: Deployed services using Docker and AWS (EC2, S3, RDS) → collaborated in a cross-functional team using Git-based workflows
      - Publication: Co-authored a KCI-indexed paper on multimodal RAG + LLM-based docent systems (Journal of Digital Contents Society, Feb 2026)
        [DOI: 10.9728/dcs.2026.27.2.473](https://doi.org/10.9728/dcs.2026.27.2.473)
